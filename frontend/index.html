<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="AI-powered research assistant — upload PDFs, textbooks, and research papers. Get precise, document-grounded answers powered by PageIndex and Qwen 2.5.">
    <title>RAG Research Assistant — Document Q&A</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <span class="brand-name">Research Paper Assistant</span>
            </div>
            <div class="header-actions">
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">No document loaded</span>
                </div>
                <button type="button" id="ingestButton" class="btn" aria-label="Ingest default document">
                    <span class="btn-icon" aria-hidden="true">↑</span>
                    <span>Ingest Default</span>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <div class="messages-container" id="messagesContainer">
            <div class="messages" id="messages">
                <!-- Welcome section — shown when no messages -->
                <div class="welcome-section" id="welcomeSection">
                    <h1 class="welcome-title">Research Paper Assistant</h1>
                </div>
            </div>
        </div>

        <!-- Composer -->
        <div class="composer-wrapper">
            <div class="ingest-progress" id="ingestProgress">
                <div class="ingest-spinner"></div>
                <span id="ingestProgressText">Uploading document...</span>
            </div>

            <!-- Floating Pop-up Bubble -->
            <div class="upload-popover" id="uploadPopover" aria-hidden="true">
                <div class="upload-zone" id="uploadZone" role="button" tabindex="0"
                    aria-label="Upload a PDF document">
                    <div class="upload-zone-text">
                        Drop your PDF here or <span class="browse-link">click to browse</span>
                    </div>
                    <input type="file" id="fileInput" accept=".pdf,application/pdf">
                    <div class="upload-progress" id="uploadProgress">
                        <div class="upload-progress-bar">
                            <div class="upload-progress-fill" id="uploadProgressFill"></div>
                        </div>
                        <div class="upload-progress-text" id="uploadProgressText">Uploading...</div>
                    </div>
                </div>
            </div>

            <form class="composer" id="chatForm" aria-label="Ask a question">
                <div class="composer-inner">
                    <button type="button" class="attach-btn" id="attachButton" aria-label="Attach document">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <input class="composer-input" id="messageInput" type="text" autocomplete="off"
                        placeholder="Ask about your document…" required aria-label="Your question">
                    <button type="submit" class="send-btn" id="sendButton" aria-label="Send message">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 2L11 13"></path>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
                        </svg>
                    </button>
                </div>
                <div class="composer-hint">
                    Answers come only from the uploaded document. Powered by <span>PageIndex</span> + <span>Qwen 2.5</span>
                </div>
            </form>

            <!-- Quick question chips -->
            <div class="welcome-chips" id="welcomeChips">
                <button class="welcome-chip" data-query="What is the main contribution of this paper?">
                    <span>Main contribution</span>
                </button>
                <button class="welcome-chip" data-query="What methodology does this paper use?">
                    <span>Methodology</span>
                </button>
                <button class="welcome-chip" data-query="What are the key findings and results?">
                    <span>Key findings</span>
                </button>
                <button class="welcome-chip" data-query="Summarize this document in detail.">
                    <span>Full summary</span>
                </button>
            </div>
        </div>
    </main>

    <script src="./script.js"></script>
</body>

</html>
